name: ilf-dev

services:
  app:
    build:
      context: .
      args:
        BUILD_COMMIT: dev
    container_name: ilf_app_dev
    env_file: .env.dev
    ports:
      - "3002:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_ilf_dev:/app/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ilf_postgres_dev
    env_file: .env.dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata_ilf_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata_ilf_dev:
  uploads_ilf_dev:
